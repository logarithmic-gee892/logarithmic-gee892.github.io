name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A7CA1C: ${{ secrets.A7CA1C }}
          BB49C0: ${{ secrets.BB49C0 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A7CA1C', '')
          bm = os.environ.get('BB49C0', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 3d464e36d39c17f8f022e1bc6e7944b0b92b -->', gm)
              if bm:
                  s2 = s2.replace('<!-- a50a4d333e90b91da9f9ab72177127ffed04283bff -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
